<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Monitor System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass {
            background: white;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(229, 231, 235, 1);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }

        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>

<body
    class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center p-4 overflow-hidden relative font-sans">

    <!-- Static Gradient Decoration -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-100/50 rounded-full blur-[120px] float">
        </div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-100/50 rounded-full blur-[120px] float"
            style="animation-delay: -3s"></div>
    </div>

    <!-- Login Container -->
    <div class="w-full max-w-md z-10">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 mb-6 shadow-2xl shadow-blue-500/20 transform rotate-12">
                <i class="fas fa-shield-halved text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 mb-2">Welcome Back</h1>
            <p class="text-gray-500 font-medium">Monitoring System Administration</p>
        </div>

        <div class="glass p-8 rounded-[2rem] shadow-2xl">
            <form id="loginForm" class="space-y-6">
                <!-- Step 1: Credentials -->
                <div id="credentialsStep" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1 uppercase tracking-wider">Email Address</label>
                        <div class="relative group">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                            <input type="email" id="email"
                                class="w-full bg-white border border-gray-200 rounded-xl py-4 pl-12 pr-4 text-gray-900 focus:outline-none input-focus transition-all placeholder-gray-400"
                                placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1 uppercase tracking-wider">Password</label>
                        <div class="relative group">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-purple-500 transition-colors"></i>
                            <input type="password" id="password"
                                class="w-full bg-white border border-gray-200 rounded-xl py-4 pl-12 pr-4 text-gray-900 focus:outline-none input-focus transition-all placeholder-gray-400"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full btn-gradient py-4 rounded-xl text-white font-bold text-lg shadow-xl shadow-blue-500/10 active:scale-[0.98]">
                        Next
                    </button>
                </div>

                <!-- Step 2: Organization Selection (Hidden initially) -->
                <div id="orgStep" class="hidden space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1 uppercase tracking-wider">Search Organization</label>
                        <div class="relative group">
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                            <input type="text" id="orgSearch"
                                class="w-full bg-white border border-gray-200 rounded-xl py-4 pl-12 pr-4 text-gray-900 focus:outline-none input-focus transition-all placeholder-gray-400"
                                placeholder="Type to search...">
                        </div>
                        
                        <!-- Search Results Dropdown -->
                        <div id="orgResults" class="mt-2 max-h-48 overflow-y-auto bg-white border border-gray-100 rounded-xl shadow-lg hidden">
                            <!-- Results populated by JS -->
                        </div>
                        <input type="hidden" id="selectedOrgId">
                    </div>

                    <button type="button" id="loginBtn" disabled
                        class="w-full bg-gray-300 py-4 rounded-xl text-white font-bold text-lg cursor-not-allowed transition-all">
                        Complete Sign In
                    </button>
                    
                    <button type="button" onclick="resetLogin()" class="w-full text-sm text-gray-500 font-medium hover:text-blue-500 transition-colors">
                        <i class="fas fa-arrow-left mr-1"></i> Use different account
                    </button>
                </div>
            </form>

            <div id="errorContainer"
                class="hidden mt-6 bg-red-500/10 border border-red-500/20 rounded-xl p-4 flex items-center gap-3 animate-shake">
                <div class="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-circle-exclamation text-red-500 text-sm"></i>
                </div>
                <p id="errorMsg" class="text-sm text-red-500 font-medium"></p>
            </div>
        </div>

        <p class="text-center mt-8 text-sm text-gray-500">
            &copy; 2026 Monitor System • Advanced Security Protocol
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        window.api = new APIClient();
        let allOrganizations = [];
        let currentToken = null;

        const loginForm = document.getElementById('loginForm');
        const credentialsStep = document.getElementById('credentialsStep');
        const orgStep = document.getElementById('orgStep');
        const orgSearch = document.getElementById('orgSearch');
        const orgResults = document.getElementById('orgResults');
        const submitBtn = document.getElementById('submitBtn');
        const loginBtn = document.getElementById('loginBtn');
        const errorContainer = document.getElementById('errorContainer');
        const errorMsg = document.getElementById('errorMsg');

        // Step 1: Initial Authentication
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!credentialsStep.classList.contains('hidden')) {
                await handleInitialAuth();
            }
        });

        async function handleInitialAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Identifying...';
            submitBtn.disabled = true;
            errorContainer.classList.add('hidden');

            try {
                const authData = await window.api.getAuthToken(email, password);
                currentToken = authData.token;
                
                // Fetch Organizations
                allOrganizations = await window.api.getAvailableOrganizations(currentToken);
                
                if (allOrganizations.length === 0) {
                    throw new Error("No organizations associated with this account.");
                }

                if (allOrganizations.length === 1) {
                    // Auto-select and proceed
                    selectOrganization(allOrganizations[0].id, allOrganizations[0].name);
                    await finalizeLogin();
                } else {
                    // Show selection step
                    credentialsStep.classList.add('hidden');
                    orgStep.classList.remove('hidden');
                    renderResults(allOrganizations);
                }
            } catch (err) {
                showError(err.message || "Authentication failed");
                submitBtn.innerHTML = 'Next';
                submitBtn.disabled = false;
            }
        }

        // Step 2: Search & Filter
        orgSearch.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allOrganizations.filter(org => 
                org.name.toLowerCase().includes(query)
            );
            renderResults(filtered);
        });

        function renderResults(orgs) {
            orgResults.innerHTML = '';
            if (orgs.length === 0) {
                orgResults.innerHTML = '<div class="p-4 text-gray-500 text-sm">No organizations found</div>';
            } else {
                orgs.forEach(org => {
                    const div = document.createElement('div');
                    div.className = 'p-4 hover:bg-blue-50 cursor-pointer transition-colors border-b border-gray-50 last:border-0';
                    div.innerHTML = `<span class="font-medium">${org.name}</span>`;
                    div.onclick = () => selectOrganization(org.id, org.name);
                    orgResults.appendChild(div);
                });
            }
            orgResults.classList.remove('hidden');
        }

        function selectOrganization(id, name) {
            document.getElementById('selectedOrgId').value = id;
            orgSearch.value = name;
            orgResults.classList.add('hidden');
            loginBtn.disabled = false;
            loginBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
            loginBtn.classList.add('btn-gradient');
        }

        loginBtn.addEventListener('click', finalizeLogin);

        async function finalizeLogin() {
            const orgId = document.getElementById('selectedOrgId').value;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Signing In...';
            loginBtn.disabled = true;

            try {
                // Since we already have the token in localStorage from getAuthToken logic? 
                // Wait, APIClient.login sets localStorage.
                // In our multi-step, getAuthToken doesn't set it yet to prevent half-logged sessions.
                // Let's ensure it's set.
                localStorage.setItem('access_token', currentToken);
                window.location.href = 'index.html';
            } catch (err) {
                showError(err.message || "Finalization failed");
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }

        function resetLogin() {
            orgStep.classList.add('hidden');
            credentialsStep.classList.remove('hidden');
            submitBtn.innerHTML = 'Next';
            submitBtn.disabled = false;
            errorContainer.classList.add('hidden');
            currentToken = null;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorContainer.classList.remove('hidden');
        }
    </script>
</body>

</html>
