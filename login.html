<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Monitor System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(229, 231, 235, 1);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gradient:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }

        .btn-gradient:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .float {
            animation: float 6s ease-in-out infinite;
        }

        .org-item {
            transition: all 0.2s;
        }

        .org-item:hover {
            background-color: #f3f4f6;
        }

        .org-item.selected {
            background-color: #eff6ff;
            border-color: #3b82f6;
        }
    </style>
</head>

<body
    class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center p-4 overflow-hidden relative font-sans">

    <!-- Static Gradient Decoration -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-100/50 rounded-full blur-[120px] float">
        </div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-100/50 rounded-full blur-[120px] float"
            style="animation-delay: -3s"></div>
    </div>

    <!-- Login Container -->
    <div class="w-full max-w-md z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center mb-6">
                <img src="img/baap.png" alt="Baap Company" class="w-48 h-auto object-contain">
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 mb-2">Welcome Back</h1>
            <p class="text-gray-500 font-medium">To The BAAP Monitoring System</p>
        </div>

        <div class="glass p-8 rounded-[2rem] shadow-2xl">
            <!-- Stage 1: Credentials -->
            <form id="stage1Form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 ml-1 uppercase tracking-wider">Email
                        Address</label>
                    <div class="relative group">
                        <i
                            class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="email" id="email"
                            class="w-full bg-white border border-gray-200 rounded-xl py-4 pl-12 pr-4 text-gray-900 focus:outline-none input-focus transition-all placeholder-gray-400"
                            placeholder="name@company.com" required>
                    </div>
                </div>

                <div>
                    <label
                        class="block text-sm font-bold text-gray-700 mb-2 ml-1 uppercase tracking-wider">Password</label>
                    <div class="relative group">
                        <i
                            class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-purple-500 transition-colors"></i>
                        <input type="password" id="password"
                            class="w-full bg-white border border-gray-200 rounded-xl py-4 pl-12 pr-4 text-gray-900 focus:outline-none input-focus transition-all placeholder-gray-400"
                            placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="stage1Btn"
                    class="w-full btn-gradient py-4 rounded-xl text-white font-bold text-lg shadow-xl shadow-blue-500/10 active:scale-[0.98]">
                    Continue
                </button>
            </form>

            <!-- Stage 2: Organization Selection (Hidden by default) -->
            <div id="stage2" class="hidden space-y-6">
                <div>
                    <div class="flex items-center justify-between mb-2 ml-1">
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider">Select
                            Organization</label>
                        <button id="backToStage1"
                            class="text-xs text-blue-500 hover:text-blue-700 font-semibold uppercase">Back</button>
                    </div>

                    <div class="relative group mb-4">
                        <i
                            class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="text" id="orgSearch"
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-12 pr-4 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all placeholder-gray-400"
                            placeholder="Search your company...">
                    </div>

                    <div id="orgList"
                        class="max-h-60 overflow-y-auto border border-gray-100 rounded-xl bg-gray-50/50 p-2 space-y-1">
                        <!-- Orgs populated by JS -->
                        <div class="text-center py-8 text-gray-400">
                            <i class="fas fa-circle-notch fa-spin text-xl mb-2"></i>
                            <p class="text-xs">Fetching organizations...</p>
                        </div>
                    </div>
                </div>

                <button id="finalLoginBtn" disabled
                    class="w-full btn-gradient py-4 rounded-xl text-white font-bold text-lg shadow-xl shadow-blue-500/10 active:scale-[0.98]">
                    Complete Sign In
                </button>
            </div>

            <div id="errorContainer"
                class="hidden mt-6 bg-red-500/10 border border-red-500/20 rounded-xl p-4 flex items-center gap-3 animate-shake">
                <div class="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-circle-exclamation text-red-500 text-sm"></i>
                </div>
                <p id="errorMsg" class="text-sm text-red-500 font-medium"></p>
            </div>
        </div>

        <p class="text-center mt-8 text-sm text-gray-500">
            &copy; 2026 Monitor System • Advanced Security Protocol
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        window.api = new APIClient();

        const stage1Form = document.getElementById('stage1Form');
        const stage2 = document.getElementById('stage2');
        const orgList = document.getElementById('orgList');
        const orgSearch = document.getElementById('orgSearch');
        const finalLoginBtn = document.getElementById('finalLoginBtn');
        const errorContainer = document.getElementById('errorContainer');
        const errorMsg = document.getElementById('errorMsg');

        let allOrganizations = [];
        let selectedOrgId = null;
        let tempToken = null;

        // Stage 1 Transition
        stage1Form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('stage1Btn');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Verifying...';
            btn.disabled = true;
            errorContainer.classList.add('hidden');

            try {
                // Get token first
                const authData = await window.api.getAuthToken(email, password);
                tempToken = authData.token;

                // Show stage 2
                stage1Form.classList.add('hidden');
                stage2.classList.remove('hidden');

                // Fetch organizations
                fetchAndDisplayOrgs(tempToken);
            } catch (err) {
                showError(err.message || "Authentication failed");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        async function fetchAndDisplayOrgs(token) {
            try {
                orgList.innerHTML = `
                    <div class="text-center py-8 text-gray-400">
                        <i class="fas fa-circle-notch fa-spin text-xl mb-2"></i>
                        <p class="text-xs">Fetching your organizations...</p>
                    </div>
                `;

                const orgs = await window.api.getAvailableOrganizations(token);
                allOrganizations = orgs;
                renderOrgList(allOrganizations);

                if (allOrganizations.length > 0) {
                    selectOrg(allOrganizations[0].id);
                }
            } catch (err) {
                showError("Failed to fetch organizations: " + err.message);
                orgList.innerHTML = `<div class="text-center py-4 text-red-500 text-xs italic">Failed to load organizations</div>`;
            }
        }

        function renderOrgList(orgs) {
            if (orgs.length === 0) {
                orgList.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">No organizations found for this account</div>`;
                return;
            }

            orgList.innerHTML = orgs.map(org => `
                <div class="org-item p-3 border border-transparent rounded-lg cursor-pointer flex items-center justify-between" 
                     data-id="${org.id}" onclick="selectOrg('${org.id}')">
                    <span class="text-sm font-medium text-gray-700">${org.name}</span>
                    <i class="fas fa-check-circle text-blue-500 opacity-0 transition-opacity"></i>
                </div>
            `).join('');
        }

        window.selectOrg = function (id) {
            selectedOrgId = id;
            document.querySelectorAll('.org-item').forEach(item => {
                const isSelected = item.getAttribute('data-id') === id;
                item.classList.toggle('selected', isSelected);
                item.querySelector('i').classList.toggle('opacity-0', !isSelected);
            });
            finalLoginBtn.disabled = false;
        };

        // Search logic
        orgSearch.addEventListener('input', async (e) => {
            const term = e.target.value.toLowerCase().trim();
            const filtered = allOrganizations.filter(o => o.name.toLowerCase().includes(term));

            // Server-side fallback: if nothing found locally or search is specific, try k parameter
            if (term.length >= 3) {
                renderOrgList(filtered); // Show local results first

                // Optional: Debounce or only fetch if needed
                // For now, let's fetch to be safe since "Baap" is missing
                try {
                    const serverResults = await window.api.getAvailableOrganizations(tempToken, term);
                    let addedAny = false;
                    for (const s of serverResults) {
                        if (!allOrganizations.find(o => o.id === s.id)) {
                            allOrganizations.push(s);
                            addedAny = true;
                        }
                    }
                    if (addedAny) {
                        const newFiltered = allOrganizations.filter(o => o.name.toLowerCase().includes(term));
                        renderOrgList(newFiltered);
                    }
                } catch (err) {
                    console.error("Server search failed", err);
                }
            } else {
                renderOrgList(filtered);
            }
            if (selectedOrgId) selectOrg(selectedOrgId);
        });

        // Stage 2 completion
        finalLoginBtn.addEventListener('click', async () => {
            const originalText = finalLoginBtn.innerHTML;
            finalLoginBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Logging in...';
            finalLoginBtn.disabled = true;
            errorContainer.classList.add('hidden');

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const selectedOrg = allOrganizations.find(o => o.id === selectedOrgId);
                const orgName = selectedOrg ? selectedOrg.name : null;

                const success = await window.api.login(email, password, selectedOrgId, orgName);
                if (success) {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                showError(err.message || "Login failed");
                finalLoginBtn.innerHTML = originalText;
                finalLoginBtn.disabled = false;
            }
        });

        document.getElementById('backToStage1').addEventListener('click', () => {
            stage2.classList.add('hidden');
            stage1Form.classList.remove('hidden');
            document.getElementById('stage1Btn').disabled = false;
            document.getElementById('stage1Btn').innerHTML = 'Continue';
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorContainer.classList.remove('hidden');
        }
    </script>
</body>

</html>
